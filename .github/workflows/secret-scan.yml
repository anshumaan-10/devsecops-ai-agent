name: "🔑 Secret Scanning"

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  secret-scan:
    name: "🔑 Detect Hardcoded Secrets"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🔑 Run Gitleaks"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: "🔍 Custom Secret Patterns Scan"
        run: |
          echo "## 🔑 Secret Scanning Report" > /tmp/secret_report.md
          echo "" >> /tmp/secret_report.md
          FOUND=0

          # Define patterns to search for
          declare -A PATTERNS
          PATTERNS=(
            ["AWS Access Key"]="AKIA[0-9A-Z]{16}"
            ["AWS Secret Key"]="['\"][0-9a-zA-Z/+]{40}['\"]"
            ["GitHub Token"]="gh[pousr]_[A-Za-z0-9_]{36,}"
            ["Generic API Key"]="[aA][pP][iI][_-]?[kK][eE][yY]\s*[=:]\s*['\"][A-Za-z0-9]{20,}['\"]"
            ["Private Key"]="-----BEGIN (RSA|EC|DSA|OPENSSH) PRIVATE KEY-----"
            ["Database URL"]="(mysql|postgres|mongodb)://[^\s\"']+"
            ["JWT Token"]="eyJ[A-Za-z0-9-_]+\.eyJ[A-Za-z0-9-_]+"
          )

          for name in "${!PATTERNS[@]}"; do
            MATCHES=$(grep -rn "${PATTERNS[$name]}" --include="*.py" --include="*.js" --include="*.ts" --include="*.yaml" --include="*.yml" --include="*.json" --include="*.env" --include="*.cfg" --include="*.ini" . 2>/dev/null | grep -v ".git/" | grep -v "node_modules/" || true)
            if [ -n "$MATCHES" ]; then
              echo "### ⚠️ $name Found" >> /tmp/secret_report.md
              echo '```' >> /tmp/secret_report.md
              echo "$MATCHES" | head -10 >> /tmp/secret_report.md
              echo '```' >> /tmp/secret_report.md
              echo "" >> /tmp/secret_report.md
              FOUND=$((FOUND + 1))
            fi
          done

          if [ $FOUND -eq 0 ]; then
            echo "✅ No hardcoded secrets detected." >> /tmp/secret_report.md
          fi

          cat /tmp/secret_report.md

      - name: "💬 Post Secret Scan Results"
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body-file /tmp/secret_report.md
